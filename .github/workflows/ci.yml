name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: "Python ${{ matrix.python-version }} / ${{ matrix.os }}"
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.9", "3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Check formatting (black)
        run: python -m black --check atlassian_rag_exporter.py tests/

      - name: Lint (ruff)
        run: python -m ruff check atlassian_rag_exporter.py tests/

      - name: Type check (mypy)
        run: python -m mypy atlassian_rag_exporter.py

      - name: Run tests with coverage
        run: python -m pytest tests/ -v --tb=short --cov=atlassian_rag_exporter --cov-report=xml:coverage.xml --cov-report=term-missing --cov-fail-under=80

      - name: Upload coverage
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.12'
        uses: codecov/codecov-action@v4
        with:
          files: coverage.xml
          fail_ci_if_error: false

