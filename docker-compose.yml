# Atlassian RAG Exporter — production Docker Compose stack
# Usage: cp .env.example .env && docker compose up -d

services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: rag-qdrant
    volumes:
      - qdrant_data:/qdrant/storage
    ports:
      - "6333:6333"
      - "6334:6334"
    restart: unless-stopped

  exporter:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: rag-exporter
    env_file: .env
    volumes:
      - ./config.yaml:/app/config.yaml:ro
      - rag_corpus:/app/rag_corpus
    depends_on:
      - qdrant
    command: ["python", "atlassian_rag_exporter.py", "--config", "config.yaml"]
    restart: "no"

  rag-api:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: rag-api
    env_file: .env
    environment:
      - QDRANT_URL=http://qdrant:6333
    volumes:
      - ./config.yaml:/app/config.yaml:ro
      - rag_corpus:/app/rag_corpus:ro
    ports:
      - "8080:8080"
    depends_on:
      - qdrant
    command: ["uvicorn", "rag_api:app", "--host", "0.0.0.0", "--port", "8080"]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  webhook:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: rag-webhook
    env_file: .env
    environment:
      - QDRANT_URL=http://qdrant:6333
    volumes:
      - ./config.yaml:/app/config.yaml:ro
      - rag_corpus:/app/rag_corpus
    ports:
      - "8081:8081"
    depends_on:
      - qdrant
    command: ["uvicorn", "webhook_listener:app", "--host", "0.0.0.0", "--port", "8081"]
    restart: unless-stopped

volumes:
  qdrant_data:
  rag_corpus:
