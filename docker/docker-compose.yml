# ============================================================
# Confluence + PostgreSQL for local testing
# confluence:latest (Server evaluation / free trial)
# ============================================================
version: "3.9"

services:
  postgres:
    image: postgres:15-alpine
    container_name: confluence_db
    environment:
      POSTGRES_DB: confluence
      POSTGRES_USER: confluence
      POSTGRES_PASSWORD: confluence_pass
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U confluence"]
      interval: 10s
      timeout: 5s
      retries: 5

  confluence:
    image: atlassian/confluence:latest
    container_name: confluence
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ATL_JDBC_URL: "jdbc:postgresql://postgres:5432/confluence"
      ATL_JDBC_USER: confluence
      ATL_JDBC_PASSWORD: confluence_pass
      ATL_DB_TYPE: postgresql72
      JVM_MINIMUM_MEMORY: 1024m
      JVM_MAXIMUM_MEMORY: 2048m
      # Uncomment to skip setup wizard (requires license key):
      # ATL_LICENSE_KEY: "YOUR_LICENSE_KEY"
    ports:
      - "8090:8090"    # Confluence HTTP
      - "8091:8091"    # Synchrony (collaborative editing)
    volumes:
      - confluence_data:/var/atlassian/application-data/confluence
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8090/status | grep -q RUNNING || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 120s

volumes:
  pgdata:
  confluence_data:
